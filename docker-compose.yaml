version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password@postgres:5432/airflowdb
    - AIRFLOW__CELERY__BROKER_URL=redis://@redis:6379/0
    - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://admin:password@postgres:5432/airflowdb
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - DB_HOST=postgres
    - DB_PORT=5432
    - REDIS_PORT=6379
  volumes:
    - ./dags:/opt/airflow/dags
    - ./tickets_dbt:/opt/airflow/tickets_dbt
    - ./logs:/opt/airflow/logs
  depends_on:
    - postgres
    - redis

services:
  # --- DATABASES & BROKERS ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airflowdb 
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.2
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9092:9092"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- THE API ---
  api:
    build: 
      context: ./api
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redpanda

  # --- AIRFLOW CELERY CLUSTER ---
  airflow-init:
    <<: *airflow-common
    # Force the explicit migration and user creation to guarantee the DB is ready
    command: bash -c "airflow db migrate && airflow users create --role Admin --username admin --email admin@example.com --firstname Admin --lastname User --password admin || true"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8085:8080" # <-- CHANGED TO 8085
    depends_on:
      airflow-init:
        condition: service_completed_successfully # <-- Waits for init to finish!

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker -H worker@%h
    depends_on:
      airflow-init:
        condition: service_completed_successfully